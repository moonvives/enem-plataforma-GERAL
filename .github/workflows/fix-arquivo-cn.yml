name: Fix Arquivo CN

on:
  push:
    branches: [main]
    paths: [.github/fix-arquivo-cn-trigger.txt]

permissions:
  contents: write

jobs:
  fix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: claude/enem-cn-non-regular-9fawlh
          fetch-depth: 0
      - name: Patch JavaScript
        run: |
          python3 - <<'PY'
          from pathlib import Path
          p=Path('docs/assets/arquivo-app.js')
          s=p.read_text(encoding='utf-8')
          reps=[
          ('"Nenhuma sessão ainda. Use "Estudar estes" no Banco."','"Nenhuma sessão ainda. Use “Estudar estes” no Banco."'),
          ('"Vá ao Banco, filtre as questões e clique em "Estudar estes"."','"Vá ao Banco, filtre as questões e clique em “Estudar estes”."'),
          ('''    if (answered || !q.gabarito || q.anulada) { showGab(q, revOut); rev.style.display = "none"; }''','''    if (q.anulada) {
      rev.style.display = "none";
      revOut.appendChild(el("span", "g", "Questão anulada pelo INEP — sem gabarito válido."));
    } else if (answered || !q.gabarito) {
      showGab(q, revOut);
      rev.style.display = "none";
    }'''),
          ('''      var all = Q.filter(function (q) { return q.materia === m; });''','''      var all = Q.filter(function (q) { return q.materia === m && q.gabarito && !q.anulada; });'''),
          ('''      var all = Q.filter(function (q) { return q.banco === bk; });''','''      var all = Q.filter(function (q) { return q.banco === bk && q.gabarito && !q.anulada; });'''),
          ('''      bb.appendChild(barRow(bk + " (" + all.length + ")", d, all.length));''','''      bb.appendChild(barRow(bk + " (" + all.length + " respondíveis)", d, all.length));'''),
          ('''      // Ignorar toque de dedo durante/após uso da caneta (palm rejection)
      if (e.pointerType === "touch" && (penIsActive || Date.now() - lastPenAt < PALM_HOLD)) return;''','''      if (e.pointerType === "touch") {
        if (penIsActive || Date.now() - lastPenAt < PALM_HOLD) {
          e.preventDefault();
          e.stopPropagation();
        }
        return;
      }''')]
          for old,new in reps:
              if old not in s: raise SystemExit('pattern not found: '+old[:60])
              s=s.replace(old,new,1)
          p.write_text(s,encoding='utf-8')
          PY
          node --check docs/assets/arquivo-app.js
          git config user.name "OpenAI Codex"
          git config user.email "codex@openai.com"
          git add docs/assets/arquivo-app.js
          git commit -m "fix: Apple Pencil, annulled questions and progress denominators"
          git push origin HEAD:claude/enem-cn-non-regular-9fawlh
