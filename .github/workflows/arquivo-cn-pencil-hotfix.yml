name: Arquivo CN Apple Pencil hotfix

on:
  push:
    branches:
      - claude/enem-cn-non-regular-9fawlh

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout do branch
        uses: actions/checkout@v4
        with:
          ref: claude/enem-cn-non-regular-9fawlh
          fetch-depth: 0

      - name: Aplicar correções e adicionar caneta vermelha
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path

          path = Path("docs/assets/arquivo-app.js")
          source = path.read_text(encoding="utf-8")

          syntax_fixes = {
              '"Nenhuma sessão ainda. Use "Estudar estes" no Banco."':
                  '"Nenhuma sessão ainda. Use \\"Estudar estes\\" no Banco."',
              '"Vá ao Banco, filtre as questões e clique em "Estudar estes"."':
                  '"Vá ao Banco, filtre as questões e clique em \\"Estudar estes\\"."',
          }
          for old, new in syntax_fixes.items():
              source = source.replace(old, new)

          if "data-tool='vermelho'" not in source:
              old_tools = "    var toolBtns = modal.querySelectorAll(\".draw-tool[data-tool='preto'],.draw-tool[data-tool='azul'],.draw-tool[data-tool='borracha']\");"
              new_tools = '''    // Insere a caneta vermelha sem exigir alteração no HTML legado/PWA.
              var azulBtn = modal.querySelector(".draw-tool[data-tool='azul']");
              if (azulBtn && !modal.querySelector(".draw-tool[data-tool='vermelho']")) {
                var vermelhoBtn = document.createElement("button");
                vermelhoBtn.className = "draw-tool";
                vermelhoBtn.dataset.tool = "vermelho";
                vermelhoBtn.textContent = "Traço vermelho";
                azulBtn.insertAdjacentElement("afterend", vermelhoBtn);

                var vermelhoCss = document.createElement("style");
                vermelhoCss.textContent = ".draw-tool[data-tool='vermelho']{color:#c0182b}.draw-tool[data-tool='vermelho'].on{background:#c0182b;color:#fff}";
                document.head.appendChild(vermelhoCss);
              }

              var toolBtns = modal.querySelectorAll(".draw-tool[data-tool='preto'],.draw-tool[data-tool='azul'],.draw-tool[data-tool='vermelho'],.draw-tool[data-tool='borracha']");'''
              if old_tools not in source:
                  raise SystemExit("Âncora toolBtns não encontrada; patch cancelado")
              source = source.replace(old_tools, new_tools, 1)

              old_colors = '    var COLORS = { preto: "#0a0a0a", azul: "#002FA7" };'
              new_colors = '    var COLORS = { preto: "#0a0a0a", azul: "#002FA7", vermelho: "#c0182b" };'
              if old_colors not in source:
                  raise SystemExit("Âncora COLORS não encontrada; patch cancelado")
              source = source.replace(old_colors, new_colors, 1)

          path.write_text(source, encoding="utf-8")
          PY

          node --check docs/assets/arquivo-app.js
          grep -q "Traço vermelho" docs/assets/arquivo-app.js
          grep -q 'vermelho: "#c0182b"' docs/assets/arquivo-app.js

      - name: Publicar correção e remover workflow temporário
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/assets/arquivo-app.js
          git rm .github/workflows/arquivo-cn-pencil-hotfix.yml
          git commit -m "fix: add red Apple Pencil tool and repair syntax"
          git push origin HEAD:claude/enem-cn-non-regular-9fawlh
