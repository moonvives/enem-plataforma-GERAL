name: Build unified sciences archive

on:
  push:
    branches:
      - chatgpt/unified-sciences-archive
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  inspect-and-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Inspect structured datasets
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          paths = [
              Path('data/questions_regular.json'),
              Path('data/questions.json'),
              Path('docs/api/modelos_cn.json'),
          ]
          report = {}
          for path in paths:
              data = json.loads(path.read_text(encoding='utf-8'))
              if isinstance(data, dict):
                  arrays = {k:v for k,v in data.items() if isinstance(v, list)}
                  report[str(path)] = {
                      'top_keys': list(data),
                      'array_lengths': {k: len(v) for k,v in arrays.items()},
                      'first_item_keys': {k: (list(v[0]) if v and isinstance(v[0], dict) else None) for k,v in arrays.items()},
                      'first_items': {k: (v[0] if v else None) for k,v in arrays.items()},
                  }
              else:
                  report[str(path)] = {'type': type(data).__name__}
          out = Path('artifacts/unified-inspection.json')
          out.parent.mkdir(parents=True, exist_ok=True)
          out.write_text(json.dumps(report, ensure_ascii=False, indent=2), encoding='utf-8')
          print(out.read_text(encoding='utf-8'))
          PY

      - name: Upload inspection
        uses: actions/upload-artifact@v4
        with:
          name: unified-inspection
          path: artifacts/unified-inspection.json
